services:
  - type: web
    name: nilaundry
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        value: base64:D3OUJ8QLQqtU9Wjs4/j5KXSrxnyl4JysnOVKLShsD54=
      - key: APP_URL
        value: https://nilaundry.onrender.com
      - key: DB_CONNECTION
        value: sqlite
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_LEVEL
        value: error
